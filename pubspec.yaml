name: flutter_svg_cjk_friendly
description: >-
  Make flutter_svg friendly to CJK text: normalizes CSS font-family lists
  (which flutter_svg treats as a single literal name, causing tofu) so
  Japanese/Chinese/Korean SVG text renders with your bundled fonts.
version: 0.2.0
homepage: https://github.com/aiseed-dev/flutter_svg_cjk_friendly
environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"
dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
